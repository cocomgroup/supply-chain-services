AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AGT-SS Secrets Stack — Secrets Manager entries for all application secrets.
  Secrets are created with placeholder values and must be populated manually
  (or via the bootstrap script) before the ECS service starts.

Parameters:
  Environment:
    Type: String
    AllowedValues: [development, staging, production]
    Default: production

Resources:

  # ─── Anthropic API Key ────────────────────────────────────────────────────

  AnthropicApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "agt-ss/${Environment}/anthropic/api-key"
      Description: Claude API key for AGT-SS LLM calls
      SecretString: '{"ANTHROPIC_API_KEY": "REPLACE_ME"}'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: AGT-SS
        - Key: MustRotate
          Value: "false"

  # ─── Application API Keys ─────────────────────────────────────────────────

  AppApiKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "agt-ss/${Environment}/api/keys"
      Description: >
        Valid API keys for the AGT-SS REST API (X-API-Key header).
        Store as a JSON array: ["key1", "key2"]
      SecretString: '["REPLACE_ME_API_KEY_1"]'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── SAP Integration ─────────────────────────────────────────────────────

  SapCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "agt-ss/${Environment}/sap/credentials"
      Description: SAP MCP / RFC credentials for spend extract
      SecretString: !Sub |
        {
          "SAP_HOST": "REPLACE_ME",
          "SAP_CLIENT": "100",
          "SAP_USERNAME": "REPLACE_ME",
          "SAP_PASSWORD": "REPLACE_ME",
          "SAP_SYSTEM_ID": "REPLACE_ME"
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── DocuSign Integration ─────────────────────────────────────────────────

  DocuSignSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "agt-ss/${Environment}/docusign/credentials"
      Description: DocuSign API credentials for contract execution
      SecretString: |
        {
          "DOCUSIGN_ACCOUNT_ID": "REPLACE_ME",
          "DOCUSIGN_CLIENT_ID":  "REPLACE_ME",
          "DOCUSIGN_CLIENT_SECRET": "REPLACE_ME",
          "DOCUSIGN_BASE_URL":  "https://demo.docusign.net"
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  AnthropicSecretArn:
    Value: !Ref AnthropicApiKeySecret
    Export:
      Name: !Sub "agt-ss-${Environment}-AnthropicSecretArn"

  AppApiKeysSecretArn:
    Value: !Ref AppApiKeysSecret
    Export:
      Name: !Sub "agt-ss-${Environment}-AppApiKeysSecretArn"

  SapSecretArn:
    Value: !Ref SapCredentialsSecret
    Export:
      Name: !Sub "agt-ss-${Environment}-SapSecretArn"

  DocuSignSecretArn:
    Value: !Ref DocuSignSecret
    Export:
      Name: !Sub "agt-ss-${Environment}-DocuSignSecretArn"
