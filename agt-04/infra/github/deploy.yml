name: AGT-SS CI/CD

on:
  push:
    branches:
      - main          # → production deploy
      - staging       # → staging deploy
    tags:
      - "v*"          # → tagged production deploy
  pull_request:
    branches:
      - main
      - staging

env:
  AWS_REGION: us-east-1
  ECR_REPO_NAME: agt-ss-api   # base name; environment suffix added below

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r agt_ss_api/requirements.txt
          pip install langgraph typing_extensions

      - name: Run agent unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run API tests
        run: python -m pytest agt_ss_api/tests/ -v --tb=short
        env:
          DISABLE_AUTH: "true"
          RUN_WORKFLOWS_ASYNC: "false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.xml"
          if-no-files-found: ignore

  # ── 2. Build & Push Docker image ──────────────────────────────────────────
  build:
    name: Build & Push
    needs: test
    # Only build on push to main/staging or version tags; not on PRs
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}
      environment: ${{ steps.env.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "name=production" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: !Sub >
            arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/agt-ss-cicd-deploy-${{ steps.env.outputs.name }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image metadata
        id: meta
        run: |
          REPO="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NAME }}-${{ steps.env.outputs.name }}"
          SHA="${GITHUB_SHA::8}"
          TAG="${{ github.ref_type == 'tag' && github.ref_name || SHA }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "uri=${REPO}:${TAG}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.uri }}
            ${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false   # avoids multi-arch manifest issues with ECR

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.uri }}
          format: table
          exit-code: "0"         # warn but don't fail on HIGH; adjust to "1" for blocking
          severity: CRITICAL,HIGH

  # ── 3. Deploy to ECS ──────────────────────────────────────────────────────
  deploy:
    name: Deploy — ${{ needs.build.outputs.environment }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ needs.build.outputs.environment }}  # uses GitHub environment secrets

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: >
            arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/agt-ss-cicd-deploy-${{ needs.build.outputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch current task definition
        id: task-def
        run: |
          ENV="${{ needs.build.outputs.environment }}"
          aws ecs describe-task-definition \
            --task-definition "agt-ss-api-${ENV}" \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: new-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: api
          image: ${{ needs.build.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.new-task-def.outputs.task-definition }}
          service: agt-ss-api-${{ needs.build.outputs.environment }}
          cluster: agt-ss-${{ needs.build.outputs.environment }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Smoke test — health endpoint
        run: |
          ALB=$(aws cloudformation describe-stacks \
            --stack-name "agt-ss-compute-${{ needs.build.outputs.environment }}" \
            --query "Stacks[0].Outputs[?OutputKey=='AlbDnsName'].OutputValue" \
            --output text)
          echo "Testing http://${ALB}/health"
          curl -sf "http://${ALB}/health" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Health check failed: {d}'
          print('Health check passed:', d)
          "

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Deployment ${STATUS}: ${{ needs.build.outputs.image_uri }}"
