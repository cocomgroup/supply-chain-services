AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AGT-SS Network Stack — VPC, public/private subnets across 2 AZs,
  NAT Gateway, Internet Gateway, and all Security Groups.
  This stack is deployed first and exports its outputs for downstream stacks.

Parameters:
  Environment:
    Type: String
    AllowedValues: [development, staging, production]
    Default: production

  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"

  # Public subnets host the ALB
  PublicSubnet1Cidr:
    Type: String
    Default: "10.0.0.0/24"
  PublicSubnet2Cidr:
    Type: String
    Default: "10.0.1.0/24"

  # Private subnets host ECS tasks and Aurora
  PrivateSubnet1Cidr:
    Type: String
    Default: "10.0.10.0/24"
  PrivateSubnet2Cidr:
    Type: String
    Default: "10.0.11.0/24"

  # Isolated subnets for Aurora (no outbound internet)
  DbSubnet1Cidr:
    Type: String
    Default: "10.0.20.0/24"
  DbSubnet2Cidr:
    Type: String
    Default: "10.0.21.0/24"

Mappings:
  EnvConfig:
    development:
      NatGateways: 1
    staging:
      NatGateways: 1
    production:
      NatGateways: 2

Resources:

  # ─── VPC ────────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-vpc-${Environment}"
        - Key: Project
          Value: AGT-SS
        - Key: Environment
          Value: !Ref Environment

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-igw-${Environment}"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ─── Public Subnets ──────────────────────────────────────────────────────

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-public-1-${Environment}"
        - Key: Tier
          Value: public

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-public-2-${Environment}"
        - Key: Tier
          Value: public

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-public-rt-${Environment}"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ─── NAT Gateways ────────────────────────────────────────────────────────

  NatEIP1:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-nat-eip-1-${Environment}"

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP1.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-nat-1-${Environment}"

  NatEIP2:
    Type: AWS::EC2::EIP
    Condition: TwoNatGateways
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway2:
    Type: AWS::EC2::NatGateway
    Condition: TwoNatGateways
    Properties:
      AllocationId: !GetAtt NatEIP2.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-nat-2-${Environment}"

  # ─── Private Subnets (ECS tasks) ─────────────────────────────────────────

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-private-1-${Environment}"
        - Key: Tier
          Value: private

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-private-2-${Environment}"
        - Key: Tier
          Value: private

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !If [TwoNatGateways, !Ref NatGateway2, !Ref NatGateway1]

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

  # ─── DB Subnets (isolated — no route to internet) ────────────────────────

  DbSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref DbSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-db-1-${Environment}"
        - Key: Tier
          Value: database

  DbSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref DbSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-db-2-${Environment}"
        - Key: Tier
          Value: database

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "AGT-SS Aurora subnet group (${Environment})"
      SubnetIds:
        - !Ref DbSubnet1
        - !Ref DbSubnet2
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── Security Groups ──────────────────────────────────────────────────────

  # ALB: accepts HTTPS from internet
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AGT-SS ALB — HTTPS inbound
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: HTTPS from internet
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: HTTP redirect
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-alb-sg-${Environment}"

  # ECS tasks: accepts traffic only from ALB
  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AGT-SS ECS tasks — inbound from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: API traffic from ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
          Description: Outbound for ECR pulls, Secrets Manager, Anthropic API
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-ecs-sg-${Environment}"

  # Aurora: accepts connections only from ECS tasks
  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AGT-SS Aurora — inbound from ECS only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsSecurityGroup
          Description: PostgreSQL from ECS tasks
      Tags:
        - Key: Name
          Value: !Sub "agt-ss-aurora-sg-${Environment}"

Conditions:
  TwoNatGateways: !Equals [!FindInMap [EnvConfig, !Ref Environment, NatGateways], 2]

Outputs:
  VpcId:
    Value: !Ref VPC
    Export:
      Name: !Sub "agt-ss-${Environment}-VpcId"

  PublicSubnet1Id:
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub "agt-ss-${Environment}-PublicSubnet1Id"

  PublicSubnet2Id:
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub "agt-ss-${Environment}-PublicSubnet2Id"

  PrivateSubnet1Id:
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub "agt-ss-${Environment}-PrivateSubnet1Id"

  PrivateSubnet2Id:
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub "agt-ss-${Environment}-PrivateSubnet2Id"

  DbSubnetGroupName:
    Value: !Ref DbSubnetGroup
    Export:
      Name: !Sub "agt-ss-${Environment}-DbSubnetGroupName"

  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub "agt-ss-${Environment}-AlbSecurityGroupId"

  EcsSecurityGroupId:
    Value: !Ref EcsSecurityGroup
    Export:
      Name: !Sub "agt-ss-${Environment}-EcsSecurityGroupId"

  AuroraSecurityGroupId:
    Value: !Ref AuroraSecurityGroup
    Export:
      Name: !Sub "agt-ss-${Environment}-AuroraSecurityGroupId"
